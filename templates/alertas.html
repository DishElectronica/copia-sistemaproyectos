<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ACTAS PENDIENTES POR FIRMA DEL CLIENTE</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .alerta-box { background: white; padding: 20px; border-radius: 8px; border-left: 6px solid #d32f2f; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f9f9f9; }
        .btn-accion { background: #1976d2; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <a href="/">← Volver al Inicio</a>
    
    <div class="alerta-box">
        <h2 style="color: #d32f2f;">⚠️ Actas Pendientes por firma del cliente</h2>
        <p>Proyectos archivados que aún no tienen el acta registrada:</p>
        
        <table>
            <thead>
                <tr>
                    <th>Proyecto</th>
                    <th>Cliente</th>
                    <th>Encargado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for p in proyectos %}
                <tr>
                    <td>{{ p.nombre_proyecto }}</td>
                    <td>{{ p.cliente }}</td>
                    <td>
                        <div title="{{ p.encargado.nombre if p.encargado else 'Sin asignar' }}" 
                             style="background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.8em; display: inline-block;">
                            {{ p.encargado.nombre if p.encargado else '??' }}
                        </div>
                    </td>
                    <td>
                        <a href="/detalle/{{ p.id }}" 
                           class="btn-accion" 
                           title="Ir a detalles del proyecto">
                           Gestionar
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table> </div>
</body>
</html>
