<!DOCTYPE html>
<html>
<head>
    <title>Proyectos Finalizados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9fafb; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f3f4f6; }
    </style>
</head>
<body>
    <h1><i class="fa-solid fa-box-archive"></i> Proyectos Archivados</h1>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="/">← Volver al tablero</a>
        
        <a href="/exportar_finalizados_csv" class="btn-action" style="background:#6b7280; color:white; padding: 10px 15px; text-decoration: none; border-radius: 6px;">
            <i class="fa-solid fa-file-excel"></i> Exportar Finalizados a Excel
        </a>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Proyecto</th>
                <th>Cliente</th>
                <th>Finalizado</th>
            </tr>
        </thead>
        <tbody>
            {% for p in proyectos %}
            <tr>
                <td>{{ p.nombre_proyecto }}</td>
                <td>{{ p.cliente }}</td>
                <td>{{ p.fecha_fin }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
