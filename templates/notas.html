<!DOCTYPE html>
<html>
<body>
    <h1>Mis Notas</h1>
    
    {% for nota in notas %}
        <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
            <p>{{ nota.contenido }}</p>
            
            {% if nota.leido == 1 %}
                <span style="color: green;">✓ LEÍDO</span>
            {% else %}
                <p>Estado: PENDIENTE</p>
                <a href="/marcar-leido/{{ nota.id }}">
                    <button style="background-color: blue; color: white;">Marcar como leído</button>
                </a>
            {% endif %}
        </div>
    {% endfor %}
</body>
</html>
