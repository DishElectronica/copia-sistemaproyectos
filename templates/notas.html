<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora de Proyecto</title>
    
</head>
<body>

    <div class="contenedor-notas">
        <h1>Notas del Proyecto</h1>
        
        {% if notas %}
            {% for nota in notas %}
                <div class="nota-tarjeta">
                    <span class="fecha">Registrado el: {{ nota.fecha_creacion }}</span>
                    
                    <div class="contenido">
                        <p>{{ nota.contenido }}</p>
                    </div>

                    <div style="margin-top: 15px;">
                        {% if nota.leido == 1 %}
                            <span style="color: green; font-weight: bold;">✓ LEÍDO</span>
                        {% else %}
                            <a href="/marcar-leido/{{ nota.id }}" class="boton-leido">Marcar como leído</a>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p>No se encontraron notas en la lista.</p>
        {% endif %}
    </div>

</body>
</html>
